name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 # GitHub membatasi pengerjaan runner maksimal 6 jam (360 menit)

    steps:
      - name: Configure Core RDP Settings
        shell: pwsh
        run: |
          # Pastikan service RDP diaktifkan dan berjalan
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService -WarningAction SilentlyContinue

          # Konfigurasi Registry RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # Hapus dan buat ulang rule firewall secara aman menggunakan native cmdlet PowerShell
          Remove-NetFirewallRule -DisplayName "RDP-Tailscale" -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName "RDP-Tailscale" -Direction Inbound -Action Allow -Protocol TCP -LocalPort 3389

          Restart-Service -Name TermService -Force

      - name: Setup Custom Wallpaper (Jalankan SEBELUM user RDP dibuat)
        shell: pwsh
        run: |
          $wallpaperUrl = "https://raw.githubusercontent.com/Kallxy1/RdpKal/4fc596f566d4cc9310f17262be6f5935887723bb/walpaperkal.png"
          $wallpaperPath = "C:\Users\Public\Pictures\wallpaper.png"
          
          Write-Host "Downloading wallpaper..."
          $null = New-Item -ItemType Directory -Path (Split-Path $wallpaperPath) -Force -ErrorAction SilentlyContinue
          Invoke-WebRequest -Uri $wallpaperUrl -OutFile $wallpaperPath
          
          reg add "HKLM\Software\Microsoft\Windows\CurrentVersion\Authentication\LogonUI\Background" /v "OEMBackground" /t REG_DWORD /d 1 /f
          
          # Load profil Default User untuk di-inject wallpaper (akan diwarisi oleh user baru)
          reg load HKEY_USERS\DefaultCustom "C:\Users\Default\NTUSER.DAT"
          reg add "HKEY_USERS\DefaultCustom\Control Panel\Desktop" /v "Wallpaper" /t REG_SZ /d "$wallpaperPath" /f
          reg add "HKEY_USERS\DefaultCustom\Control Panel\Desktop" /v "WallpaperStyle" /t REG_SZ /d "2" /f
          reg unload HKEY_USERS\DefaultCustom

      - name: Create RDP User with Secure Password
        shell: pwsh
        run: |
          # Periksa dan hapus user "RDP" lama jika ada (tanpa parameter -Force yang tidak valid)
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP"
          }

          # Hindari karakter ", ', $, `, dan \ agar tidak merusak formatting string
          $upper   = [char[]](65..90)      # A-Z
          $lower   = [char[]](97..122)     # a-z
          $number  = [char[]](48..57)      # 0-9
          $special = [char[]]"!@#%^&*()-_=+[]{}|;:,.<>/?"

          $rawPassword = @()
          $rawPassword += $upper | Get-Random -Count 4
          $rawPassword += $lower | Get-Random -Count 4
          $rawPassword += $number | Get-Random -Count 4
          $rawPassword += $special | Get-Random -Count 4
          
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Daftarkan user baru
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          
          # Simpan ke env variable GitHub Actions secara aman
          Add-Content -Path $env:GITHUB_ENV -Value "RDP_PASSWORD=$password"
          
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "Gagal membuat user lokal RDP"
              exit 1
          }

      - name: Install VS Code and Dev Tools
        shell: pwsh
        run: |
          Write-Host "Menginstal VS Code..."
          # Menggunakan web installer resmi, jauh lebih cepat dan andal daripada winget db di runner non-interaktif
          $vscodeUrl = "https://code.visualstudio.com/sha/download?build=stable&os=win32-x64-user"
          $installerPath = "$env:TEMP\vscode-setup.exe"
          Invoke-WebRequest -Uri $vscodeUrl -OutFile $installerPath
          Start-Process $installerPath -ArgumentList "/verysilent", "/mergetasks=!runcode" -Wait
          Remove-Item $installerPath -Force
          Write-Host "VS Code sukses diinstal."
          
          # Catatan: Node.js, Python, dan Git SUDAH terinstal di image runner secara bawaan, tidak perlu diupgrade.

      - name: Install Tailscale
        shell: pwsh
        run: |
          # Menggunakan Chocolatey untuk mengambil versi stabil paling baru
          choco install tailscale -y --no-progress
          
          # Memperbarui cache environment path agar program langsung bisa dijalankan
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

      - name: Establish Tailscale Connection
        shell: pwsh
        run: |
          # Menjalankan tailscale up dengan aman
          $arguments = @(
            "up",
            "--authkey=${{ secrets.TAILSCALE_AUTH_KEY }}",
            "--hostname=gh-runner-$env:GITHUB_RUN_ID"
          )
          & "$env:ProgramFiles\Tailscale\tailscale.exe" @arguments
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              # Saring error action preference agar tidak crash saat mencari IP
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              if ($tsIP) {
                  $tsIP = $tsIP.Trim()
              }
              Start-Sleep -Seconds 5
              $retries++
          }

          if (-not $tsIP) {
              Write-Error "Gagal mendapatkan IP Tailscale."
              exit 1
          }
          
          Add-Content -Path $env:GITHUB_ENV -Value "TAILSCALE_IP=$tsIP"
      
      - name: Verify RDP Accessibility
        shell: pwsh
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          
          # Menunggu hingga service RDP siap menerima koneksi port 3389
          $portOpen = $false
          for ($i = 1; $i -le 6; $i++) {
              $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
              if ($testResult.TcpTestSucceeded) {
                  $portOpen = $true
                  break
              }
              Write-Host "Mencoba tes koneksi ke port RDP 3389 (Percobaan $i/6)..."
              Start-Sleep -Seconds 5
          }
          
          if (-not $portOpen) {
              Write-Error "Koneksi TCP ke port RDP 3389 gagal diinisialisasi"
              exit 1
          }
          Write-Host "Koneksi TCP sukses!"

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== INFORMASI AKSES RDP ==="
          Write-Host "Alamat IP Tailscale : $env:TAILSCALE_IP"
          Write-Host "Username           : RDP"
          Write-Host "Password           : $env:RDP_PASSWORD"
          Write-Host "==========================`n"
          
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Aktif - Gunakan Ctrl+C pada workflow untuk mematikan"
              Start-Sleep -Seconds 300
          }
